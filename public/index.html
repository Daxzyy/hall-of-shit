<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOS Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface-2: #1a1a26;
      --surface-3: #22223a;
      --border: #2a2a40;
      --text: #e8e8f0;
      --text-muted: #7070a0;
      --text-dim: #4a4a70;
      --accent: #ffffff;
      --accent-soft: rgba(255, 255, 255, 0.12);
      --danger: #ff4757;
      --radius: 12px;
      --radius-sm: 8px;
      --transition: 0.2s ease;
    }

    html { scroll-behavior: smooth; }

    a, button, input, select { color: inherit; }

    body {
      font-family: "Space Grotesk", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
    }

    .header-inner {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: 1rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Space Mono", monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -1px;
      flex-shrink: 0;
    }

    .logo-text {
      font-family: "Space Mono", monospace;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--text);
      text-transform: uppercase;
    }

    .counter-badge {
      font-family: "Space Mono", monospace;
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 4px 12px;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .counter-badge span {
      color: var(--text);
      font-weight: 700;
    }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 2rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.75rem;
      align-items: center;
    }

    .search-wrap {
      flex: 1 1 100%;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px 10px 40px;
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
      font-size: 14px;
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
    }

    .search-input::placeholder { color: var(--text-dim); }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .filter-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      font-family: "Space Grotesk", sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      white-space: nowrap;
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab-btn:hover { color: var(--text); background: var(--surface-2); }

    .tab-btn.active {
      background: var(--accent);
      color: #0a0a0f;
    }

    .sort-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      transition: border-color var(--transition);
      margin-left: auto;
    }

    .sort-select:focus { border-color: var(--accent); }

    .sort-select option { background: var(--surface-2); }

    .section-label {
      font-family: "Space Mono", monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .gallery-list {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--accent-soft);
    }

    .card-img-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: var(--surface-2);
      cursor: pointer;
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease, opacity var(--transition);
      display: block;
    }

    .card-img-wrap:hover .card-img { transform: scale(1.04); }

    .card-img.loading { opacity: 0; }
    .card-img.loaded { opacity: 1; }

    .img-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-2);
      color: var(--text-dim);
      font-size: 40px;
    }

    .img-placeholder.hidden { display: none; }

    .zoom-hint {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 4px 9px;
      font-size: 10px;
      color: rgba(255,255,255,0.7);
      font-family: "Space Mono", monospace;
      letter-spacing: 1px;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity var(--transition), transform var(--transition);
      pointer-events: none;
    }

    .card-img-wrap:hover .zoom-hint { opacity: 1; transform: translateY(0); }

    .card-body {
      padding: 1.1rem 1.25rem;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.6rem;
      gap: 0.5rem;
    }

    .category-badge {
      font-family: "Space Mono", monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 3px 9px;
      border-radius: 100px;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }

    .card-date {
      font-family: "Space Mono", monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.4rem;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.55;
    }

    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 2rem;
      gap: 1rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--surface-3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner-label {
      font-family: "Space Mono", monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 2rem;
      gap: 1rem;
      text-align: center;
    }

    .empty-icon { font-size: 48px; opacity: 0.3; }

    .empty-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .empty-sub {
      font-size: 13px;
      color: var(--text-dim);
      max-width: 300px;
      line-height: 1.5;
    }

    .error-banner {
      background: rgba(255, 71, 87, 0.1);
      border: 1px solid rgba(255, 71, 87, 0.3);
      border-radius: var(--radius);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .error-icon { font-size: 24px; }

    .error-text { font-size: 14px; color: var(--danger); }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .lightbox.open { display: flex; }

    .lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .lightbox-img {
      max-width: 90vw;
      max-height: 80vh;
      object-fit: contain;
      border-radius: var(--radius);
      box-shadow: 0 30px 100px rgba(0, 0, 0, 0.8);
      display: block;
    }

    .lightbox-info {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .lightbox-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .lightbox-close {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: background var(--transition);
      z-index: 1000;
    }

    .lightbox-close:hover { background: rgba(255,255,255,0.16); }

    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 2rem;
      margin-top: 3rem;
    }

    .footer-inner {
      font-family: "Space Mono", monospace;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 2px;
    }

    @media (max-width: 640px) {
      main { padding: 1.25rem; }
      header { padding: 0 1.25rem; }
      .logo-text { display: none; }
      .sort-select { margin-left: 0; flex: 1 1 100%; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">
      <div class="logo-mark">HA</div>
      <span class="logo-text">HOS</span>
    </a>
    <div class="counter-badge" id="counterBadge">
      Loading&hellip;
    </div>
  </div>
</header>

<main>
  <div class="controls">
    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Search title or description&hellip;" autocomplete="off" />
    </div>

    <div class="filter-tabs" id="filterTabs"></div>

    <select class="sort-select" id="sortSelect">
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
    </select>
  </div>

  <div class="section-label" id="sectionLabel">— Archive</div>

  <div class="gallery-list" id="gallery"></div>
</main>

<footer>
  <div class="footer-inner">HOS Archive</div>
</footer>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <button class="lightbox-close" id="lightboxClose" aria-label="Close">&#x2715;</button>
  <div class="lightbox-inner">
    <img class="lightbox-img" id="lightboxImg" src="" alt="" />
    <div class="lightbox-info">
      <span class="lightbox-title" id="lightboxTitle"></span>
    </div>
  </div>
</div>

<script>
  const CATEGORY_PALETTE = [
    { bg: "rgba(255, 107, 107, 0.15)", color: "#ff6b6b", border: "rgba(255, 107, 107, 0.3)" },
    { bg: "rgba(78, 205, 196, 0.15)", color: "#4ecdc4", border: "rgba(78, 205, 196, 0.3)" },
    { bg: "rgba(255, 230, 109, 0.15)", color: "#ffe66d", border: "rgba(255, 230, 109, 0.3)" },
    { bg: "rgba(149, 175, 255, 0.15)", color: "#95afff", border: "rgba(149, 175, 255, 0.3)" },
    { bg: "rgba(255, 159, 243, 0.15)", color: "#ff9ff3", border: "rgba(255, 159, 243, 0.3)" },
    { bg: "rgba(126, 214, 145, 0.15)", color: "#7ed691", border: "rgba(126, 214, 145, 0.3)" },
    { bg: "rgba(255, 159, 67, 0.15)", color: "#ff9f43", border: "rgba(255, 159, 67, 0.3)" },
    { bg: "rgba(165, 94, 234, 0.15)", color: "#a55eea", border: "rgba(165, 94, 234, 0.3)" }
  ];

  let allData = [];
  let activeCategory = "all";
  let searchQuery = "";
  let sortOrder = "newest";

  const gallery = document.getElementById("gallery");
  const counterBadge = document.getElementById("counterBadge");
  const sectionLabel = document.getElementById("sectionLabel");
  const searchInput = document.getElementById("searchInput");
  const sortSelect = document.getElementById("sortSelect");
  const filterTabs = document.getElementById("filterTabs");
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightboxImg");
  const lightboxTitle = document.getElementById("lightboxTitle");
  const lightboxClose = document.getElementById("lightboxClose");

  async function fetchData() {
    showSpinner();
    try {
      const res = await fetch("/api/list");
      if (!res.ok) throw new Error(`Server responded with ${res.status}`);
      const json = await res.json();
      allData = json.data || [];
      renderFilterTabs();
      renderGallery();
    } catch (err) {
      showError(err.message);
    }
  }

  function hashStr(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = (hash << 5) - hash + str.charCodeAt(i);
      hash |= 0;
    }
    return Math.abs(hash);
  }

  function getCategoryStyle(category) {
    const palette = CATEGORY_PALETTE[hashStr(category) % CATEGORY_PALETTE.length];
    return `background:${palette.bg};color:${palette.color};border:1px solid ${palette.border};`;
  }

  function renderFilterTabs() {
    const categories = [...new Set(allData.map(i => i.category))].sort((a, b) => a.localeCompare(b));

    filterTabs.innerHTML = "";

    const allBtn = document.createElement("button");
    allBtn.className = "tab-btn" + (activeCategory === "all" ? " active" : "");
    allBtn.dataset.cat = "all";
    allBtn.textContent = "All";
    filterTabs.appendChild(allBtn);

    categories.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "tab-btn" + (activeCategory === cat ? " active" : "");
      btn.dataset.cat = cat;
      btn.textContent = cat;
      filterTabs.appendChild(btn);
    });

    if (activeCategory !== "all" && !categories.includes(activeCategory)) {
      activeCategory = "all";
      filterTabs.querySelector('[data-cat="all"]').classList.add("active");
    }
  }

  function getFiltered() {
    let items = [...allData];

    if (activeCategory !== "all") {
      items = items.filter(i => i.category === activeCategory);
    }

    if (searchQuery.trim()) {
      const q = searchQuery.toLowerCase();
      items = items.filter(i =>
        i.title.toLowerCase().includes(q) ||
        i.description.toLowerCase().includes(q)
      );
    }

    items.sort((a, b) => {
      const da = new Date(a.createdAt || a.date);
      const db = new Date(b.createdAt || b.date);
      return sortOrder === "newest" ? db - da : da - db;
    });

    return items;
  }

  function renderGallery() {
    const items = getFiltered();
    gallery.innerHTML = "";

    counterBadge.innerHTML = `Showing <span>${items.length}</span> of ${allData.length}`;
    sectionLabel.textContent = `— ${items.length} item${items.length !== 1 ? "s" : ""} in archive`;

    if (items.length === 0) {
      gallery.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🗂️</div>
          <div class="empty-title">Nothing found</div>
          <div class="empty-sub">Try changing your search or filter to see more entries.</div>
        </div>`;
      return;
    }

    items.forEach(item => {
      const card = buildCard(item);
      gallery.appendChild(card);
    });
  }

  function buildCard(item) {
    const wrapper = document.createElement("div");
    wrapper.className = "card";
    wrapper.dataset.id = item.id;

    wrapper.innerHTML = `
      <div class="card-img-wrap">
        <div class="img-placeholder" id="ph-${item.id}">📷</div>
        <img
          class="card-img loading"
          id="img-${item.id}"
          src="${escHtml(item.image)}"
          alt="${escHtml(item.title)}"
          loading="lazy"
        />
        <span class="zoom-hint">⊕ ZOOM</span>
      </div>
      <div class="card-body">
        <div class="card-meta">
          <span class="category-badge" style="${getCategoryStyle(item.category)}">${escHtml(item.category)}</span>
          <span class="card-date">${formatDate(item.date)}</span>
        </div>
        <div class="card-title">${escHtml(item.title)}</div>
        <div class="card-desc">${escHtml(item.description)}</div>
      </div>`;

    const img = wrapper.querySelector(".card-img");
    const ph = wrapper.querySelector(".img-placeholder");

    img.onload = () => {
      img.classList.remove("loading");
      img.classList.add("loaded");
      ph.classList.add("hidden");
    };

    img.onerror = () => {
      img.style.display = "none";
      ph.innerHTML = "🖼️";
    };

    const imgWrap = wrapper.querySelector(".card-img-wrap");
    imgWrap.addEventListener("click", () => {
      openLightbox(item.image, item.title);
    });

    return wrapper;
  }

  function openLightbox(src, title) {
    lightboxImg.src = src;
    lightboxTitle.textContent = title;
    lightbox.classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeLightbox() {
    lightbox.classList.remove("open");
    document.body.style.overflow = "";
    lightboxImg.src = "";
  }

  lightboxClose.addEventListener("click", closeLightbox);

  lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) closeLightbox();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeLightbox();
  });

  filterTabs.addEventListener("click", (e) => {
    const btn = e.target.closest(".tab-btn");
    if (!btn) return;
    filterTabs.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeCategory = btn.dataset.cat;
    renderGallery();
  });

  searchInput.addEventListener("input", () => {
    searchQuery = searchInput.value;
    renderGallery();
  });

  sortSelect.addEventListener("change", () => {
    sortOrder = sortSelect.value;
    renderGallery();
  });

  function showSpinner() {
    gallery.innerHTML = `
      <div class="spinner-wrap">
        <div class="spinner"></div>
        <div class="spinner-label">Loading Archive</div>
      </div>`;
    counterBadge.innerHTML = "Loading&hellip;";
  }

  function showError(msg) {
    gallery.innerHTML = `
      <div class="error-banner">
        <div class="error-icon">⚠️</div>
        <div class="error-text">Failed to load archive: ${escHtml(msg)}</div>
      </div>`;
    counterBadge.innerHTML = "Error";
  }

  function formatDate(dateStr) {
    try {
      return new Date(dateStr).toLocaleDateString("en-GB", {
        day: "2-digit", month: "short", year: "numeric"
      });
    } catch {
      return dateStr;
    }
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  fetchData();
</script>

</body>
</html>
