<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOS Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #0d0d12;
      --surface: #15151c;
      --surface-2: #1c1c26;
      --surface-3: #242430;
      --border: #2a2a36;
      --ink: #ececf2;
      --muted: #85859e;
      --dim: #4d4d63;
      --accent: #e8b339;
      --accent-ink: #0d0d12;
      --accent-soft: rgba(232, 179, 57, 0.14);
      --danger: #ff5d72;
      --radius: 10px;
      --radius-sm: 7px;
      --transition: 0.18s ease;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: "Space Grotesk", sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    a, button, input, select, textarea {
      font: inherit;
      color: inherit;
    }

    ::selection { background: var(--accent); color: var(--accent-ink); }

    :focus { outline: none; }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
      border-radius: 4px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13, 13, 18, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
    }

    .header-inner {
      max-width: 880px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      gap: 1rem;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-mark {
      width: 30px;
      height: 30px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Space Mono", monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -1px;
      flex-shrink: 0;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
    }

    .brand-title {
      font-family: "Space Mono", monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--ink);
      text-transform: uppercase;
    }

    .brand-sub {
      font-family: "Space Mono", monospace;
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--dim);
      text-transform: uppercase;
    }

    .counter-badge {
      font-family: "Space Mono", monospace;
      font-size: 10px;
      color: var(--muted);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 4px 11px;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .counter-badge span { color: var(--accent); font-weight: 700; }

    main {
      max-width: 880px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .controls { margin-bottom: 1.4rem; }

    .search-wrap {
      position: relative;
      margin-bottom: 0.6rem;
    }

    .search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--dim);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 9px 13px 9px 38px;
      color: var(--ink);
      font-size: 13px;
      transition: border-color var(--transition);
    }

    .search-input::placeholder { color: var(--dim); }
    .search-input:focus { border-color: var(--accent); }

    .filter-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .filter-tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      flex: 1;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .filter-tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 100px;
      background: var(--surface);
      color: var(--muted);
      font-size: 11.5px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition), color var(--transition), border-color var(--transition);
      white-space: nowrap;
      max-width: 130px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tab-btn:hover { color: var(--ink); border-color: var(--dim); }

    .tab-btn.active {
      background: var(--accent);
      color: var(--accent-ink);
      border-color: var(--accent);
    }

    .sort-select {
      flex-shrink: 0;
      appearance: none;
      -webkit-appearance: none;
      background: var(--surface) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="%2385859e" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>') no-repeat right 10px center;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 28px 8px 11px;
      font-size: 11.5px;
      cursor: pointer;
      transition: border-color var(--transition);
    }

    .sort-select:focus { border-color: var(--accent); }
    .sort-select option { background: var(--surface-2); color: var(--ink); }

    .section-label {
      font-family: "Space Mono", monospace;
      font-size: 9.5px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 1rem;
      padding-bottom: 0.7rem;
      border-bottom: 1px solid var(--border);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(112px, 1fr));
      gap: 10px;
    }

    .entry {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .entry-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--surface-2);
      border: 1px solid var(--border);
      transition: border-color var(--transition), transform var(--transition);
    }

    .entry:hover .entry-frame {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .entry-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.35s ease, opacity var(--transition);
    }

    .entry-img.loading { opacity: 0; }
    .entry-img.loaded { opacity: 1; }

    .entry:hover .entry-img { transform: scale(1.06); }

    .img-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-2);
      color: var(--dim);
      font-size: 26px;
    }

    .img-placeholder.hidden { display: none; }

    .entry-index {
      position: absolute;
      top: 5px;
      left: 5px;
      font-family: "Space Mono", monospace;
      font-size: 8.5px;
      letter-spacing: 0.5px;
      color: rgba(236, 236, 242, 0.75);
      background: rgba(13, 13, 18, 0.55);
      padding: 2px 5px;
      border-radius: 4px;
      z-index: 2;
    }

    .entry-stamp {
      position: absolute;
      bottom: 5px;
      left: 5px;
      right: 5px;
      font-family: "Space Mono", monospace;
      font-size: 8.5px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      text-align: center;
      padding: 3px 4px;
      border-radius: 3px;
      border: 1px dashed currentColor;
      transform: rotate(-1.5deg);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: rgba(13, 13, 18, 0.55);
      backdrop-filter: blur(2px);
      z-index: 2;
    }

    .entry-meta {
      padding-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .entry-title {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .entry-date {
      font-family: "Space Mono", monospace;
      font-size: 9.5px;
      color: var(--dim);
      letter-spacing: 0.5px;
    }

    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
      gap: 0.9rem;
      grid-column: 1 / -1;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--surface-3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner-label {
      font-family: "Space Mono", monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--dim);
      text-transform: uppercase;
    }

    .empty-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 1.5rem;
      gap: 0.8rem;
      text-align: center;
    }

    .empty-icon { font-size: 38px; opacity: 0.3; }

    .empty-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
    }

    .empty-sub {
      font-size: 12px;
      color: var(--dim);
      max-width: 280px;
      line-height: 1.5;
    }

    .error-banner {
      grid-column: 1 / -1;
      background: rgba(255, 93, 114, 0.1);
      border: 1px solid rgba(255, 93, 114, 0.3);
      border-radius: var(--radius);
      padding: 1.2rem 1.4rem;
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .error-icon { font-size: 20px; }
    .error-text { font-size: 13px; color: var(--danger); }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .lightbox.open { display: flex; }

    .lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.9rem;
    }

    .lightbox-img {
      max-width: 90vw;
      max-height: 62vh;
      object-fit: contain;
      border-radius: var(--radius);
      box-shadow: 0 30px 100px rgba(0, 0, 0, 0.8);
      display: block;
    }

    .lightbox-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      text-align: center;
      max-width: 440px;
    }

    .lightbox-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
    }

    .lightbox-meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .lightbox-stamp {
      font-family: "Space Mono", monospace;
      font-size: 9.5px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 3px;
      border: 1px dashed currentColor;
      transform: rotate(-1.5deg);
    }

    .lightbox-date {
      font-family: "Space Mono", monospace;
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 0.5px;
    }

    .lightbox-desc {
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.55;
    }

    .lightbox-close {
      position: fixed;
      top: 1.3rem;
      right: 1.3rem;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      color: var(--ink);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      transition: background var(--transition);
      z-index: 1000;
    }

    .lightbox-close:hover { background: rgba(255, 255, 255, 0.16); }

    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 1.6rem;
      margin-top: 2.4rem;
    }

    .footer-inner {
      font-family: "Space Mono", monospace;
      font-size: 10px;
      color: var(--dim);
      letter-spacing: 2px;
    }

    @media (min-width: 480px) {
      .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(128px, 1fr)); gap: 12px; }
    }

    @media (min-width: 720px) {
      .gallery-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 14px; }
    }

    @media (max-width: 480px) {
      header { padding: 0 1rem; }
      main { padding: 1.1rem; }
      .brand-sub { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <div class="brand-mark">HA</div>
      <div class="brand-text">
        <span class="brand-title">HOS</span>
        <span class="brand-sub">Archive Log</span>
      </div>
    </div>
    <div class="counter-badge" id="counterBadge">Loading&hellip;</div>
  </div>
</header>

<main>
  <div class="controls">
    <div class="search-wrap">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Search title or description&hellip;" autocomplete="off" />
    </div>

    <div class="filter-row">
      <div class="filter-tabs" id="filterTabs"></div>
      <select class="sort-select" id="sortSelect">
        <option value="newest">Newest</option>
        <option value="oldest">Oldest</option>
      </select>
    </div>
  </div>

  <div class="section-label" id="sectionLabel">— Archive</div>

  <div class="gallery-grid" id="gallery"></div>
</main>

<footer>
  <div class="footer-inner">HOS Archive</div>
</footer>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <button class="lightbox-close" id="lightboxClose" aria-label="Close">&#x2715;</button>
  <div class="lightbox-inner">
    <img class="lightbox-img" id="lightboxImg" src="" alt="" />
    <div class="lightbox-info">
      <span class="lightbox-title" id="lightboxTitle"></span>
      <div class="lightbox-meta-row">
        <span class="lightbox-stamp" id="lightboxStamp"></span>
        <span class="lightbox-date" id="lightboxDate"></span>
      </div>
      <p class="lightbox-desc" id="lightboxDesc"></p>
    </div>
  </div>
</div>

<script>
  const CATEGORY_PALETTE = [
    "#ff6b6b", "#4ecdc4", "#ffe66d", "#95afff",
    "#ff9ff3", "#7ed691", "#ff9f43", "#a55eea"
  ];

  let allData = [];
  let chronoIndex = new Map();
  let activeCategory = "all";
  let searchQuery = "";
  let sortOrder = "newest";

  const gallery = document.getElementById("gallery");
  const counterBadge = document.getElementById("counterBadge");
  const sectionLabel = document.getElementById("sectionLabel");
  const searchInput = document.getElementById("searchInput");
  const sortSelect = document.getElementById("sortSelect");
  const filterTabs = document.getElementById("filterTabs");
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightboxImg");
  const lightboxTitle = document.getElementById("lightboxTitle");
  const lightboxStamp = document.getElementById("lightboxStamp");
  const lightboxDate = document.getElementById("lightboxDate");
  const lightboxDesc = document.getElementById("lightboxDesc");
  const lightboxClose = document.getElementById("lightboxClose");

  async function fetchData() {
    showSpinner();
    try {
      const res = await fetch("/api/list");
      if (!res.ok) throw new Error(`Server responded with ${res.status}`);
      const json = await res.json();
      allData = json.data || [];
      buildChronoIndex();
      renderFilterTabs();
      renderGallery();
    } catch (err) {
      showError(err.message);
    }
  }

  function buildChronoIndex() {
    chronoIndex = new Map();
    const sorted = [...allData].sort((a, b) => {
      const da = new Date(a.createdAt || a.date);
      const db = new Date(b.createdAt || b.date);
      return da - db;
    });
    sorted.forEach((item, i) => {
      chronoIndex.set(item.id, i + 1);
    });
  }

  function hashStr(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = (hash << 5) - hash + str.charCodeAt(i);
      hash |= 0;
    }
    return Math.abs(hash);
  }

  function getCategoryColor(category) {
    return CATEGORY_PALETTE[hashStr(category) % CATEGORY_PALETTE.length];
  }

  function renderFilterTabs() {
    const categories = [...new Set(allData.map(i => i.category))].sort((a, b) => a.localeCompare(b));

    filterTabs.innerHTML = "";

    const allBtn = document.createElement("button");
    allBtn.className = "tab-btn" + (activeCategory === "all" ? " active" : "");
    allBtn.dataset.cat = "all";
    allBtn.textContent = "All";
    filterTabs.appendChild(allBtn);

    categories.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "tab-btn" + (activeCategory === cat ? " active" : "");
      btn.dataset.cat = cat;
      btn.textContent = cat;
      filterTabs.appendChild(btn);
    });

    if (activeCategory !== "all" && !categories.includes(activeCategory)) {
      activeCategory = "all";
      filterTabs.querySelector('[data-cat="all"]').classList.add("active");
    }
  }

  function getFiltered() {
    let items = [...allData];

    if (activeCategory !== "all") {
      items = items.filter(i => i.category === activeCategory);
    }

    if (searchQuery.trim()) {
      const q = searchQuery.toLowerCase();
      items = items.filter(i =>
        i.title.toLowerCase().includes(q) ||
        i.description.toLowerCase().includes(q)
      );
    }

    items.sort((a, b) => {
      const da = new Date(a.createdAt || a.date);
      const db = new Date(b.createdAt || b.date);
      return sortOrder === "newest" ? db - da : da - db;
    });

    return items;
  }

  function renderGallery() {
    const items = getFiltered();
    gallery.innerHTML = "";

    counterBadge.innerHTML = `<span>${items.length}</span> / ${allData.length} filed`;
    sectionLabel.textContent = `— ${items.length} entr${items.length === 1 ? "y" : "ies"}`;

    if (items.length === 0) {
      gallery.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🗂️</div>
          <div class="empty-title">No matching entries</div>
          <div class="empty-sub">Adjust the search or category filter to find what you're looking for.</div>
        </div>`;
      return;
    }

    items.forEach(item => {
      const card = buildCard(item);
      gallery.appendChild(card);
    });
  }

  function buildCard(item) {
    const wrapper = document.createElement("div");
    wrapper.className = "entry";
    wrapper.dataset.id = item.id;

    const index = chronoIndex.get(item.id) || 0;
    const catColor = getCategoryColor(item.category);

    wrapper.innerHTML = `
      <div class="entry-frame">
        <div class="img-placeholder" id="ph-${item.id}">📷</div>
        <img
          class="entry-img loading"
          id="img-${item.id}"
          src="${escHtml(item.image)}"
          alt="${escHtml(item.title)}"
          loading="lazy"
        />
        <span class="entry-index">#${index}</span>
        <span class="entry-stamp" style="color:${catColor};">${escHtml(item.category)}</span>
      </div>
      <div class="entry-meta">
        <span class="entry-title">${escHtml(item.title)}</span>
        <span class="entry-date">${formatDate(item.date)}</span>
      </div>`;

    const img = wrapper.querySelector(".entry-img");
    const ph = wrapper.querySelector(".img-placeholder");

    img.onload = () => {
      img.classList.remove("loading");
      img.classList.add("loaded");
      ph.classList.add("hidden");
    };

    img.onerror = () => {
      img.style.display = "none";
      ph.innerHTML = "🖼️";
    };

    wrapper.addEventListener("click", () => {
      openLightbox(item);
    });

    return wrapper;
  }

  function openLightbox(item) {
    lightboxImg.src = item.image;
    lightboxTitle.textContent = item.title;
    lightboxStamp.textContent = item.category;
    lightboxStamp.style.color = getCategoryColor(item.category);
    lightboxDate.textContent = formatDate(item.date);
    lightboxDesc.textContent = item.description;
    lightbox.classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeLightbox() {
    lightbox.classList.remove("open");
    document.body.style.overflow = "";
    lightboxImg.src = "";
  }

  lightboxClose.addEventListener("click", closeLightbox);

  lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) closeLightbox();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeLightbox();
  });

  filterTabs.addEventListener("click", (e) => {
    const btn = e.target.closest(".tab-btn");
    if (!btn) return;
    filterTabs.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeCategory = btn.dataset.cat;
    renderGallery();
  });

  searchInput.addEventListener("input", () => {
    searchQuery = searchInput.value;
    renderGallery();
  });

  sortSelect.addEventListener("change", () => {
    sortOrder = sortSelect.value;
    renderGallery();
  });

  function showSpinner() {
    gallery.innerHTML = `
      <div class="spinner-wrap">
        <div class="spinner"></div>
        <div class="spinner-label">Loading Archive</div>
      </div>`;
    counterBadge.innerHTML = "Loading&hellip;";
  }

  function showError(msg) {
    gallery.innerHTML = `
      <div class="error-banner">
        <div class="error-icon">⚠️</div>
        <div class="error-text">Failed to load archive: ${escHtml(msg)}</div>
      </div>`;
    counterBadge.innerHTML = "Error";
  }

  function formatDate(dateStr) {
    try {
      return new Date(dateStr).toLocaleDateString("en-GB", {
        day: "2-digit", month: "short", year: "numeric"
      });
    } catch {
      return dateStr;
    }
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  fetchData();
</script>

</body>
</html>
