<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOS Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface-2: #1a1a26;
      --surface-3: #22223a;
      --border: #2a2a40;
      --text: #e8e8f0;
      --text-muted: #7070a0;
      --text-dim: #4a4a70;
      --accent: #6c63ff;
      --accent-soft: rgba(108, 99, 255, 0.15);
      --accent-glow: rgba(108, 99, 255, 0.4);
      --cat-a: #ff6b6b;
      --cat-b: #4ecdc4;
      --cat-c: #ffe66d;
      --danger: #ff4757;
      --danger-soft: rgba(255, 71, 87, 0.15);
      --radius: 12px;
      --radius-sm: 8px;
      --transition: 0.2s ease;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: "Space Grotesk", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      gap: 1rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-mark {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Space Mono", monospace;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
      flex-shrink: 0;
    }

    .logo-text {
      font-family: "Space Mono", monospace;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--text);
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .counter-badge {
      font-family: "Space Mono", monospace;
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 4px 12px;
      letter-spacing: 1px;
      white-space: nowrap;
    }

    .counter-badge span {
      color: var(--accent);
      font-weight: 700;
    }

    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      align-items: center;
    }

    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px 10px 40px;
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
      font-size: 14px;
      transition: border-color var(--transition), box-shadow var(--transition);
      outline: none;
    }

    .search-input::placeholder { color: var(--text-dim); }

    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .filter-tabs {
      display: flex;
      gap: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px;
      flex-wrap: wrap;
    }

    .tab-btn {
      padding: 6px 16px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      font-family: "Space Grotesk", sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
      white-space: nowrap;
    }

    .tab-btn:hover { color: var(--text); background: var(--surface-2); }

    .tab-btn.active {
      background: var(--accent);
      color: #fff;
    }

    .sort-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      color: var(--text);
      font-family: "Space Grotesk", sans-serif;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      transition: border-color var(--transition);
    }

    .sort-select:focus { border-color: var(--accent); }

    .sort-select option { background: var(--surface-2); }

    .section-label {
      font-family: "Space Mono", monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
      position: relative;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4), 0 0 0 1px var(--accent-soft);
    }

    .card-img-wrap {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: var(--surface-2);
    }

    .card-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease, opacity var(--transition);
      display: block;
    }

    .card:hover .card-img { transform: scale(1.06); }

    .card-img.loading { opacity: 0; }
    .card-img.loaded { opacity: 1; }

    .img-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-2);
      color: var(--text-dim);
      font-size: 40px;
    }

    .img-placeholder.hidden { display: none; }

    .zoom-hint {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 10px;
      color: rgba(255,255,255,0.7);
      font-family: "Space Mono", monospace;
      letter-spacing: 1px;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity var(--transition), transform var(--transition);
      pointer-events: none;
    }

    .card:hover .zoom-hint { opacity: 1; transform: translateY(0); }

    .card-body {
      padding: 1rem;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .category-badge {
      font-family: "Space Mono", monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      padding: 3px 9px;
      border-radius: 100px;
      text-transform: uppercase;
    }

    .cat-A { background: rgba(255, 107, 107, 0.15); color: var(--cat-a); border: 1px solid rgba(255, 107, 107, 0.3); }
    .cat-B { background: rgba(78, 205, 196, 0.15); color: var(--cat-b); border: 1px solid rgba(78, 205, 196, 0.3); }
    .cat-C { background: rgba(255, 230, 109, 0.15); color: var(--cat-c); border: 1px solid rgba(255, 230, 109, 0.3); }

    .card-date {
      font-family: "Space Mono", monospace;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 1px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.4rem;
      line-height: 1.3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 0.75rem;
    }

    .card-footer {
      border-top: 1px solid var(--border);
      padding-top: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-id {
      font-family: "Space Mono", monospace;
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
    }

    .delete-toggle-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      padding: 4px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      transition: color var(--transition), background var(--transition);
      font-size: 14px;
    }

    .delete-toggle-btn:hover {
      color: var(--danger);
      background: var(--danger-soft);
    }

    .delete-confirm-area {
      display: none;
      gap: 0.5rem;
      align-items: center;
      width: 100%;
      padding-top: 0.5rem;
    }

    .delete-confirm-area.visible {
      display: flex;
    }

    .delete-confirm-area span {
      font-size: 12px;
      color: var(--danger);
      flex: 1;
    }

    .btn-cancel-delete {
      background: var(--surface-3);
      border: 1px solid var(--border);
      color: var(--text-muted);
      font-family: "Space Grotesk", sans-serif;
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: background var(--transition);
    }

    .btn-cancel-delete:hover { background: var(--surface-2); }

    .btn-confirm-delete {
      background: var(--danger);
      border: none;
      color: #fff;
      font-family: "Space Grotesk", sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity var(--transition);
    }

    .btn-confirm-delete:hover { opacity: 0.85; }

    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 2rem;
      gap: 1rem;
      grid-column: 1 / -1;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--surface-3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .spinner-label {
      font-family: "Space Mono", monospace;
      font-size: 11px;
      letter-spacing: 2px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .empty-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 2rem;
      gap: 1rem;
      text-align: center;
    }

    .empty-icon { font-size: 48px; opacity: 0.3; }

    .empty-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .empty-sub {
      font-size: 13px;
      color: var(--text-dim);
      max-width: 300px;
      line-height: 1.5;
    }

    .error-banner {
      grid-column: 1 / -1;
      background: rgba(255, 71, 87, 0.1);
      border: 1px solid rgba(255, 71, 87, 0.3);
      border-radius: var(--radius);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .error-icon { font-size: 24px; }

    .error-text { font-size: 14px; color: var(--danger); }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 999;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .lightbox.open { display: flex; }

    .lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .lightbox-img {
      max-width: 90vw;
      max-height: 80vh;
      object-fit: contain;
      border-radius: var(--radius);
      box-shadow: 0 30px 100px rgba(0, 0, 0, 0.8);
      display: block;
    }

    .lightbox-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .lightbox-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .lightbox-close {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 18px;
      transition: background var(--transition);
      z-index: 1000;
    }

    .lightbox-close:hover { background: rgba(255,255,255,0.16); }

    .toast-container {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 9999;
      pointer-events: none;
    }

    .toast {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      font-size: 13px;
      color: var(--text);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      animation: slideIn 0.25s ease, fadeOut 0.4s ease 2.5s forwards;
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toast.success { border-left: 3px solid #4caf50; }
    .toast.error { border-left: 3px solid var(--danger); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeOut {
      to { opacity: 0; transform: translateX(20px); }
    }

    footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 2rem;
      margin-top: 4rem;
    }

    .footer-inner {
      font-family: "Space Mono", monospace;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 2px;
    }

    .footer-inner span { color: var(--accent); }

    @media (max-width: 640px) {
      main { padding: 1rem; }
      .controls { gap: 0.75rem; }
      .gallery-grid { grid-template-columns: 1fr 1fr; gap: 0.75rem; }
      .logo-text { display: none; }
      header { padding: 0 1rem; }
    }

    @media (max-width: 400px) {
      .gallery-grid { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">
      <div class="logo-mark">HA</div>
      <span class="logo-text">HOS Archive</span>
    </a>
    <div class="header-right">
      <div class="counter-badge" id="counterBadge">
        Loading&hellip;
      </div>
    </div>
  </div>
</header>

<main>
  <div class="controls">
    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Search title or description&hellip;" autocomplete="off" />
    </div>

    <div class="filter-tabs" id="filterTabs">
      <button class="tab-btn active" data-cat="all">All</button>
      <button class="tab-btn" data-cat="A">Cat A</button>
      <button class="tab-btn" data-cat="B">Cat B</button>
      <button class="tab-btn" data-cat="C">Cat C</button>
    </div>

    <select class="sort-select" id="sortSelect">
      <option value="newest">Newest First</option>
      <option value="oldest">Oldest First</option>
    </select>
  </div>

  <div class="section-label" id="sectionLabel">— Archive</div>

  <div class="gallery-grid" id="gallery"></div>
</main>

<footer>
  <div class="footer-inner">
    HOS ARCHIVE &mdash; <span>API Ready</span> &mdash; CRUD Enabled
  </div>
</footer>

<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <button class="lightbox-close" id="lightboxClose" aria-label="Close">&#x2715;</button>
  <div class="lightbox-inner">
    <img class="lightbox-img" id="lightboxImg" src="" alt="" />
    <div class="lightbox-info">
      <span class="lightbox-title" id="lightboxTitle"></span>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
  let allData = [];
  let activeCategory = "all";
  let searchQuery = "";
  let sortOrder = "newest";

  const gallery = document.getElementById("gallery");
  const counterBadge = document.getElementById("counterBadge");
  const sectionLabel = document.getElementById("sectionLabel");
  const searchInput = document.getElementById("searchInput");
  const sortSelect = document.getElementById("sortSelect");
  const filterTabs = document.getElementById("filterTabs");
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightboxImg");
  const lightboxTitle = document.getElementById("lightboxTitle");
  const lightboxClose = document.getElementById("lightboxClose");

  async function fetchData() {
    showSpinner();
    try {
      const res = await fetch("/api/list");
      if (!res.ok) throw new Error(`Server responded with ${res.status}`);
      const json = await res.json();
      allData = json.data || [];
      renderGallery();
    } catch (err) {
      showError(err.message);
    }
  }

  function getFiltered() {
    let items = [...allData];

    if (activeCategory !== "all") {
      items = items.filter(i => i.category === activeCategory);
    }

    if (searchQuery.trim()) {
      const q = searchQuery.toLowerCase();
      items = items.filter(i =>
        i.title.toLowerCase().includes(q) ||
        i.description.toLowerCase().includes(q)
      );
    }

    items.sort((a, b) => {
      const da = new Date(a.createdAt || a.date);
      const db = new Date(b.createdAt || b.date);
      return sortOrder === "newest" ? db - da : da - db;
    });

    return items;
  }

  function renderGallery() {
    const items = getFiltered();
    gallery.innerHTML = "";

    counterBadge.innerHTML = `Showing <span>${items.length}</span> of ${allData.length}`;
    sectionLabel.textContent = `— ${items.length} item${items.length !== 1 ? "s" : ""} in archive`;

    if (items.length === 0) {
      gallery.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🗂️</div>
          <div class="empty-title">Nothing found</div>
          <div class="empty-sub">Try changing your search or filter to see more entries.</div>
        </div>`;
      return;
    }

    items.forEach(item => {
      const card = buildCard(item);
      gallery.appendChild(card);
    });
  }

  function buildCard(item) {
    const wrapper = document.createElement("div");
    wrapper.className = "card";
    wrapper.dataset.id = item.id;

    wrapper.innerHTML = `
      <div class="card-img-wrap">
        <div class="img-placeholder" id="ph-${item.id}">📷</div>
        <img
          class="card-img loading"
          id="img-${item.id}"
          src="${escHtml(item.image)}"
          alt="${escHtml(item.title)}"
          loading="lazy"
        />
        <span class="zoom-hint">⊕ ZOOM</span>
      </div>
      <div class="card-body">
        <div class="card-meta">
          <span class="category-badge cat-${escHtml(item.category)}">Cat ${escHtml(item.category)}</span>
          <span class="card-date">${formatDate(item.date)}</span>
        </div>
        <div class="card-title" title="${escHtml(item.title)}">${escHtml(item.title)}</div>
        <div class="card-desc">${escHtml(item.description)}</div>
        <div class="card-footer">
          <span class="card-id">#${item.id}</span>
          <button class="delete-toggle-btn" title="Delete entry" aria-label="Delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
            </svg>
          </button>
        </div>
        <div class="delete-confirm-area" id="dc-${item.id}">
          <span>Delete this entry?</span>
          <button class="btn-cancel-delete">Cancel</button>
          <button class="btn-confirm-delete">Delete</button>
        </div>
      </div>`;

    const img = wrapper.querySelector(".card-img");
    const ph = wrapper.querySelector(".img-placeholder");

    img.onload = () => {
      img.classList.remove("loading");
      img.classList.add("loaded");
      ph.classList.add("hidden");
    };

    img.onerror = () => {
      img.style.display = "none";
      ph.innerHTML = "🖼️";
    };

    const imgWrap = wrapper.querySelector(".card-img-wrap");
    imgWrap.addEventListener("click", (e) => {
      e.stopPropagation();
      openLightbox(item.image, item.title);
    });

    const deleteToggle = wrapper.querySelector(".delete-toggle-btn");
    const confirmArea = wrapper.querySelector(".delete-confirm-area");
    const cancelBtn = wrapper.querySelector(".btn-cancel-delete");
    const confirmBtn = wrapper.querySelector(".btn-confirm-delete");

    deleteToggle.addEventListener("click", (e) => {
      e.stopPropagation();
      confirmArea.classList.toggle("visible");
    });

    cancelBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      confirmArea.classList.remove("visible");
    });

    confirmBtn.addEventListener("click", async (e) => {
      e.stopPropagation();
      await deleteEntry(item.id, wrapper);
    });

    return wrapper;
  }

  async function deleteEntry(id, cardEl) {
    try {
      const res = await fetch(`/api/delete/${id}`, { method: "DELETE" });
      const json = await res.json();

      if (!res.ok) throw new Error(json.message || "Delete failed");

      cardEl.style.transition = "opacity 0.3s, transform 0.3s";
      cardEl.style.opacity = "0";
      cardEl.style.transform = "scale(0.9)";

      setTimeout(() => {
        allData = allData.filter(i => i.id !== id);
        renderGallery();
      }, 300);

      showToast("Entry deleted successfully", "success");
    } catch (err) {
      showToast(err.message, "error");
    }
  }

  function openLightbox(src, title) {
    lightboxImg.src = src;
    lightboxTitle.textContent = title;
    lightbox.classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeLightbox() {
    lightbox.classList.remove("open");
    document.body.style.overflow = "";
    lightboxImg.src = "";
  }

  lightboxClose.addEventListener("click", closeLightbox);

  lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) closeLightbox();
  });

  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeLightbox();
  });

  filterTabs.addEventListener("click", (e) => {
    const btn = e.target.closest(".tab-btn");
    if (!btn) return;
    filterTabs.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    activeCategory = btn.dataset.cat;
    renderGallery();
  });

  searchInput.addEventListener("input", () => {
    searchQuery = searchInput.value;
    renderGallery();
  });

  sortSelect.addEventListener("change", () => {
    sortOrder = sortSelect.value;
    renderGallery();
  });

  function showSpinner() {
    gallery.innerHTML = `
      <div class="spinner-wrap">
        <div class="spinner"></div>
        <div class="spinner-label">Loading Archive</div>
      </div>`;
    counterBadge.innerHTML = "Loading&hellip;";
  }

  function showError(msg) {
    gallery.innerHTML = `
      <div class="error-banner">
        <div class="error-icon">⚠️</div>
        <div class="error-text">Failed to load archive: ${escHtml(msg)}</div>
      </div>`;
    counterBadge.innerHTML = "Error";
  }

  function showToast(message, type = "success") {
    const container = document.getElementById("toastContainer");
    const toast = document.createElement("div");
    toast.className = `toast ${type}`;
    toast.innerHTML = `${type === "success" ? "✓" : "✕"} ${escHtml(message)}`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  function formatDate(dateStr) {
    try {
      return new Date(dateStr).toLocaleDateString("en-GB", {
        day: "2-digit", month: "short", year: "numeric"
      });
    } catch {
      return dateStr;
    }
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  fetchData();
</script>

</body>
</html>
